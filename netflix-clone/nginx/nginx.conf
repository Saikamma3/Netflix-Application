worker_processes auto;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/vnd.apple.mpegurl video/mp2t;

    # Security headers
    add_header X-Frame-Options           SAMEORIGIN   always;
    add_header X-Content-Type-Options    nosniff      always;
    add_header X-XSS-Protection          "1; mode=block" always;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api:10m   rate=120r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m  rate=10r/m;
    limit_req_zone $binary_remote_addr zone=stream:10m rate=300r/m;

    upstream api_gateway  { server api-gateway:3000; keepalive 32; }
    upstream frontend_app { server frontend:80;      keepalive 16; }

    server {
        listen 80;
        server_name _;

        # ── API ────────────────────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── HLS Streaming ──────────────────────────────────────────
        location /stream/ {
            limit_req zone=stream burst=60 nodelay;
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_read_timeout 120s;
            add_header         Cache-Control "no-cache";
            add_header         Access-Control-Allow-Origin "*";
        }

        # ── Frontend SPA ──────────────────────────────────────────
        location / {
            proxy_pass            http://frontend_app;
            proxy_http_version    1.1;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}
