worker_processes auto;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/vnd.apple.mpegurl video/mp2t;

    # Security headers
    add_header X-Frame-Options           SAMEORIGIN   always;
    add_header X-Content-Type-Options    nosniff      always;
    add_header X-XSS-Protection          "1; mode=block" always;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api:10m   rate=120r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m  rate=10r/m;
    limit_req_zone $binary_remote_addr zone=stream:10m rate=300r/m;

    upstream api_gateway  { server api-gateway:3000; keepalive 32; }
    upstream frontend_app { server frontend:80;      keepalive 16; }

    server {
        listen 80;
        server_name _;

        # ── API ────────────────────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://api_gateway;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://api_gateway;
            include /etc/nginx/proxy_params.conf;
        }

        # ── HLS Streaming (allow large buffers, no limit_req) ─────
        location /stream/ {
            limit_req zone=stream burst=60 nodelay;
            proxy_pass http://api_gateway;
            proxy_buffering off;
            proxy_read_timeout 120s;
            include /etc/nginx/proxy_params.conf;

            # HLS content-type headers
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin "*";
        }

        # ── Frontend SPA ──────────────────────────────────────────
        location / {
            proxy_pass http://frontend_app;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
            include /etc/nginx/proxy_params.conf;
        }
    }
}
