version: "3.9"

services:
  # ─── Infrastructure ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: enterprise_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enterprise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-enterprise}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enterprise_net

  redis:
    image: redis:7-alpine
    container_name: enterprise_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enterprise_net

  # ─── Backend Services ───────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    container_name: enterprise_auth
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-enterprise}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-enterprise_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - enterprise_net

  user-service:
    build:
      context: ./backend/services/user-service
      dockerfile: Dockerfile
    container_name: enterprise_users
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-enterprise}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-enterprise_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - enterprise_net

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: enterprise_gateway
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - user-service
    networks:
      - enterprise_net

  # ─── Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: enterprise_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - enterprise_net

  # ─── Edge / Reverse Proxy ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: enterprise_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api-gateway
      - frontend
    networks:
      - enterprise_net

volumes:
  postgres_data:
  redis_data:

networks:
  enterprise_net:
    driver: bridge
